<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desempeño Financiero — Storemed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --lime:#C8D100; --lime-dk:#8A9100; --lime-lt:#F6F9CC;
  --navy:#1B2437; --navy2:#243049;
  --bg:#F4F5F7; --surface:#FFFFFF; --border:#E4E6EB;
  --text:#111827; --muted:#6B7280; --hint:#9CA3AF;
  --pos:#059669; --pos-lt:#ECFDF5;
  --neg:#DC2626; --neg-lt:#FEF2F2;
  --warn:#D97706; --warn-lt:#FFFBEB;
  --info:#2563EB; --info-lt:#EFF6FF;
  --purple:#7C3AED; --purple-lt:#F5F3FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

/* ── Top Nav ── */
.topnav{background:var(--navy);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo-svg{height:44px;width:auto}
.nav-right{display:flex;align-items:center;gap:20px}
.ctrl-label{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.year-grp{display:flex;border:1px solid rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.year-grp button{padding:5px 18px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.55);transition:all .15s}
.year-grp button.on{background:var(--lime);color:var(--navy)}
.nav-meta{font-size:10px;color:rgba(255,255,255,.4)}

/* ── Page ── */
.page{max-width:1380px;margin:0 auto;padding:24px 28px}
.page-hdr{margin-bottom:18px}
.page-hdr h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.page-hdr p{font-size:12px;color:var(--muted);margin-top:3px}

/* ── Month chips ── */
.mchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;align-items:center}
.mchip-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-right:4px;text-transform:uppercase;letter-spacing:.05em}
.mchip{padding:4px 13px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);border-radius:20px;color:var(--muted);background:var(--surface);transition:all .15s}
.mchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.mchip:hover:not(.on){border-color:var(--lime-dk);color:var(--lime-dk)}

/* ── KPI cards ── */
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
@media(max-width:960px){.kgrid{grid-template-columns:repeat(3,1fr)}}
.kcard{background:var(--surface);border-radius:14px;padding:18px 18px 16px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px}
.kcard.lime::before{background:var(--lime)}
.kcard.purple::before{background:var(--purple)}
.kcard.green::before{background:var(--pos)}
.kcard.orange::before{background:var(--warn)}
.kcard.red::before{background:var(--neg)}
.kcard.pos-kcard::before{background:var(--pos)}
.klabel{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.kval{font-size:24px;font-weight:800;margin:6px 0 3px;line-height:1.1;letter-spacing:-.5px}
.ksub{font-size:10px;color:var(--hint)}
.kbadge{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.kbadge.g{background:var(--pos-lt);color:var(--pos)}
.kbadge.r{background:var(--neg-lt);color:var(--neg)}
.kbadge.y{background:var(--warn-lt);color:var(--warn)}

/* ── P&L Table ── */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px;overflow:hidden}
.card-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.card-hdr h2{font-size:13px;font-weight:700;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--lime);flex-shrink:0}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{background:#FAFBFC;padding:9px 12px;text-align:right;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap}
thead th:first-child{text-align:left;min-width:170px;padding-left:20px}
tbody td{padding:7px 12px;text-align:right;border-bottom:1px solid #F3F4F6;font-size:12px;color:var(--text);white-space:nowrap}
tbody td:first-child{text-align:left;padding-left:20px;font-weight:500}
tr.sep td{border-top:2px solid #D1D5DB;font-weight:800;background:#F8F9FA;font-size:12px}
tr.sub td{font-size:10px;color:var(--hint);padding-top:1px;padding-bottom:5px;border-bottom:1px solid #F8F9FA}
tr.neg-row td{color:var(--neg)}
tr.sep.neg-row td{color:var(--neg)}
td.sel{background:#EFF6FF}
td.ytd-c{background:var(--lime-lt);font-weight:800;color:var(--navy)}
th.sel{background:#DBEAFE}
th.ytd-c{background:#E8EC80;color:var(--navy);font-weight:800}

/* ── Chart ── */
.chart-inner{padding:20px}

/* ── Footer ── */
footer{text-align:center;padding:24px;font-size:11px;color:var(--hint)}

/* ── Loading ── */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px}
.spin{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--lime);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#dashboard{display:none}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <p style="color:var(--muted);font-size:13px">Cargando datos…</p>
</div>

<div id="dashboard">
  <nav class="topnav">
    <svg class="logo-svg" viewBox="0 0 260 72" xmlns="http://www.w3.org/2000/svg">
      <polyline points="0,36 38,36 50,52 62,8 74,64 86,36 260,36"
                stroke="#C8D100" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="118" y="24" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="300"
            letter-spacing="6" fill="rgba(255,255,255,0.7)">STORE</text>
      <text x="114" y="63" font-family="'Segoe UI',sans-serif" font-size="46" font-weight="300"
            letter-spacing="2" fill="rgba(255,255,255,0.85)">ed</text>
    </svg>
    <div class="nav-right">
      <div>
        <div class="ctrl-label">Año</div>
        <div class="year-grp" id="yg"></div>
      </div>
      <div class="nav-meta" id="nav-meta"></div>
    </div>
  </nav>

  <div class="page">
    <div class="page-hdr">
      <h1>Desempeño Financiero</h1>
      <p id="main-sub">Fecha Clasificación · Cifras en CLP neto de IVA</p>
    </div>

    <div class="mchips">
      <span class="mchip-lbl">Acumular hasta (YTD)</span>
      <div id="chips"></div>
    </div>

    <div class="kgrid" id="kgrid"></div>

    <div class="card">
      <div class="card-hdr"><div class="dot"></div><h2>Estado de Resultados</h2></div>
      <div class="tbl-wrap"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
    </div>

    <div class="card">
      <div class="card-hdr"><div class="dot"></div><h2>Evolución Mensual</h2></div>
      <div class="chart-inner"><canvas id="ch" height="80"></canvas></div>
    </div>
  </div>

  <footer>Storemed · Datos Chipax · Fecha Clasificación · Cifras en CLP neto de IVA</footer>
</div>

<script>
const ML=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let D=null, year='2026', ytdIdx=null, myChart=null;

const fN=v=>Math.round(v).toLocaleString('es-CL');
const fC=v=>{const a=Math.abs(v),s=v<0?'−':'';return a>=1e9?s+(a/1e9).toFixed(2)+'B':a>=1e6?s+(a/1e6).toFixed(1)+'M':s+fN(a)};
const pct=(v,b)=>b?(v/b*100).toFixed(1)+'%':'—';
const ml=m=>ML[+m.split('-')[1]-1];

function getData(){
  const yd=D[year], months=yd.months, src=yd.data;
  const end=ytdIdx!==null?Math.min(ytdIdx,months.length-1):months.length-1;
  const sel=months.slice(0,end+1);
  const ytd={ing:0,mp:0,tal:0,cv:0,tr:0,cf:0,gav:0,gf:0,oe:0,mb:0,mn:0,util:0};
  sel.forEach(m=>{const d=src[m];if(d)Object.keys(ytd).forEach(k=>ytd[k]+=(d[k]||0))});
  return {months,src,sel,end,ytd};
}

function calcPE(ytd){
  const fix=ytd.cf+ytd.gav+ytd.gf+ytd.oe;
  const mnp=ytd.ing>0?ytd.mn/ytd.ing:0;
  return mnp>0?fix/mnp:0;
}

function badge(v,meta,inv=false){
  if(!meta)return '';
  const r=v/meta, g=inv?(r<=1.05):(r>=0.95), y=inv?(r<=1.15):(r>=0.80);
  const cls=g?'g':y?'y':'r', lbl=(v/meta*100).toFixed(0)+'% de meta';
  return `<span class="kbadge ${cls}">${lbl}</span>`;
}

function render(){
  if(!D)return;
  const {months,src,sel,end,ytd}=getData();
  const pe=calcPE(ytd);
  const metas=(D.metas||{})[year]||{};
  const mbPct=ytd.ing?ytd.mb/ytd.ing*100:0;
  const mnPct=ytd.ing?ytd.mn/ytd.ing*100:0;
  const utilOk=ytd.util>=0;

  // Chips
  document.getElementById('chips').innerHTML=months.map((m,i)=>
    `<span class="mchip${i<=end?' on':''}" onclick="setYTD(${i})">${ml(m)}</span>`
  ).join('');

  // KPIs
  document.getElementById('kgrid').innerHTML=`
    <div class="kcard lime">
      <div class="klabel">Ventas YTD</div>
      <div class="kval" style="color:var(--info)">${fC(ytd.ing)}</div>
      <div class="ksub">Meta anual: ${fC(metas.ing||0)}</div>
      ${badge(ytd.ing,metas.ing)}
    </div>
    <div class="kcard purple">
      <div class="klabel">Punto de Equilibrio</div>
      <div class="kval" style="color:var(--purple)">${fC(pe)}</div>
      <div class="ksub">Ventas mín. para cubrir fijos</div>
      <span class="kbadge ${ytd.ing>=pe?'g':'r'}">${ytd.ing>=pe?'Sobre PE':'Bajo PE'}</span>
    </div>
    <div class="kcard green">
      <div class="klabel">Margen Bruto</div>
      <div class="kval" style="color:${mbPct>=(metas.mb_pct||60)?'var(--pos)':'var(--neg)'}">${mbPct.toFixed(1)}%</div>
      <div class="ksub">Meta: ${metas.mb_pct||'—'}% · ${fC(ytd.mb)}</div>
      ${badge(mbPct,metas.mb_pct)}
    </div>
    <div class="kcard orange">
      <div class="klabel">Margen Neto</div>
      <div class="kval" style="color:${mnPct>=(metas.mn_pct||30)?'var(--pos)':'var(--neg)'}">${mnPct.toFixed(1)}%</div>
      <div class="ksub">Meta: ${metas.mn_pct||'—'}% · ${fC(ytd.mn)}</div>
      ${badge(mnPct,metas.mn_pct)}
    </div>
    <div class="kcard ${utilOk?'green':'red'}">
      <div class="klabel">Utilidad YTD</div>
      <div class="kval" style="color:${utilOk?'var(--pos)':'var(--neg)'}">${fC(ytd.util)}</div>
      <div class="ksub">Meta anual: ${fC(metas.util||0)}</div>
      ${badge(ytd.util,metas.util)}
    </div>`;

  // Table header
  const thCols=months.map((m,i)=>`<th class="${i<=end?'sel':''}">${ml(m)}</th>`).join('')+'<th class="ytd-c">YTD</th>';
  document.getElementById('thead').innerHTML=`<tr><th>Concepto</th>${thCols}</tr>`;

  // P&L rows
  const ROWS=[
    {k:'ing', l:'Ventas',              sep:false,neg:false},
    {k:'mp',  l:'(-) Materia Prima',   sep:false,neg:true},
    {k:'tal', l:'(-) Talleres',        sep:false,neg:true},
    {k:'mb',  l:'= Margen Bruto',      sep:true, neg:false},
    {k:'cv',  l:'(-) Otros CV',        sep:false,neg:true},
    {k:'tr',  l:'(-) Transporte',      sep:false,neg:true},
    {k:'mn',  l:'= Margen Neto',       sep:true, neg:false},
    {k:'cf',  l:'(-) Costos Fijos',    sep:false,neg:true},
    {k:'gav', l:'(-) GAV',             sep:false,neg:true},
    {k:'gf',  l:'(-) G. Financieros',  sep:false,neg:true},
    {k:'oe',  l:'(-) Otros Egresos',   sep:false,neg:true},
    {k:'util',l:'= Utilidad',          sep:true, neg:false},
  ];

  document.getElementById('tbody').innerHTML=ROWS.map(r=>{
    const ytdV=ytd[r.k];
    const negCls=(r.sep&&ytdV<0)||(!r.sep&&r.neg&&ytdV>0)?'':r.sep&&ytdV<0?' neg-row':'';
    const sepCls=r.sep?' sep':'';
    const cells=months.map((m,i)=>{
      const v=src[m]?.[r.k]??0;
      return `<td class="${i<=end?'sel':''}">${fN(v)}</td>`;
    }).join('')+`<td class="ytd-c">${fN(ytdV)}</td>`;
    const pctCells=months.map((m,i)=>{
      const v=src[m]?.[r.k]??0, ing=src[m]?.ing??0;
      return `<td class="${i<=end?'sel':''}">${ing?pct(v,ing):''}</td>`;
    }).join('')+`<td class="ytd-c">${ytd.ing?pct(ytdV,ytd.ing):''}</td>`;
    return `<tr class="${sepCls}${ytdV<0&&r.sep?' neg-row':''}"><td>${r.l}</td>${cells}</tr><tr class="sub"><td></td>${pctCells}</tr>`;
  }).join('');

  // Chart
  if(myChart)myChart.destroy();
  myChart=new Chart(document.getElementById('ch'),{
    type:'line',
    data:{labels:months.map(m=>ml(m)),datasets:[
      {label:'Ventas',      data:months.map(m=>src[m]?.ing||0), borderColor:'#2563EB',borderWidth:2,tension:.35,fill:false,pointRadius:4},
      {label:'M. Bruto',   data:months.map(m=>src[m]?.mb||0),  borderColor:'#059669',borderWidth:2,tension:.35,fill:false,pointRadius:4},
      {label:'M. Neto',    data:months.map(m=>src[m]?.mn||0),  borderColor:'#7C3AED',borderWidth:2,tension:.35,fill:false,pointRadius:4,borderDash:[5,3]},
      {label:'Utilidad',   data:months.map(m=>src[m]?.util||0),borderColor:'#C8D100',borderWidth:2.5,tension:.35,fill:false,pointRadius:4},
    ]},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}}},
      scales:{y:{ticks:{callback:v=>fC(v),font:{size:10}},grid:{color:'#F3F4F6'}},
              x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });

  const lastM=sel[sel.length-1];
  document.getElementById('main-sub').textContent=`Acumulado a ${lastM?ml(lastM):'—'} (YTD) · ${sel.length} mes${sel.length===1?'':'es'} · Fecha Clasificación`;
  document.getElementById('nav-meta').textContent=`Actualizado: ${D.generated_at||'—'}`;
}

function setYear(y){year=y;ytdIdx=null;document.querySelectorAll('#yg button').forEach(b=>b.classList.toggle('on',b.dataset.y===y));render()}
function setYTD(i){ytdIdx=(ytdIdx===i)?null:i;render()}

async function init(){
  try{
    const r=await fetch('./data/storemed_data.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    D=await r.json();
    const years=Object.keys(D).filter(k=>/^\d{4}$/.test(k)).sort().reverse();
    year=years[0];
    document.getElementById('yg').innerHTML=years.map(y=>
      `<button data-y="${y}" class="${y===year?'on':''}" onclick="setYear('${y}')">${y}</button>`
    ).join('');
    document.getElementById('loading').style.display='none';
    document.getElementById('dashboard').style.display='block';
    render();
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:var(--neg);font-weight:700">Error al cargar datos: ${e.message}</p>`;
  }
}
init();
</script>
</body>
</html>
